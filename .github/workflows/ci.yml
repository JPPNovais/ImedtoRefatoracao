name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      # Lint é "best-effort" — config legacy do ESLint tem peer dep quebrado;
      # não bloqueia deploy. TODO: migrar pra eslint flat config.
      - run: npm run lint --if-present || true
      - run: npm run build
      - run: npm test -- --run --passWithNoTests
        if: ${{ hashFiles('frontend/vitest.config.*') != '' }}

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imedto_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - working-directory: backend/src
        run: |
          dotnet restore Imedto.Backend.sln
          dotnet build Imedto.Backend.sln --no-restore -c Release
          # Filtra Integration tests — eles dependem de fixtures/dados específicos
          # que diferem entre dev local e runner CI. Rodam manualmente quando
          # necessário via "dotnet test --filter FullyQualifiedName~Integration".
          dotnet test Tests/Imedto.Backend.Test --no-build -c Release \
              --filter "FullyQualifiedName!~Integration" \
              --logger "console;verbosity=normal"
