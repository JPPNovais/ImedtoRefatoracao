name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  migrate:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Generate idempotent SQL
        working-directory: backend/src
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.0 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations script --idempotent \
              --project Services/Imedto.Backend.Infrastructure \
              --startup-project Services/Imedto.Backend.API \
              --output /tmp/migrate.sql

      - name: Send SQL & migrate-script to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          scp -i ~/.ssh/deploy.pem /tmp/migrate.sql "ec2-user@${EC2_HOST}:/tmp/migrate.sql"
          scp -i ~/.ssh/deploy.pem deploy/scripts/migrate.sh "ec2-user@${EC2_HOST}:/tmp/migrate.sh"

      - name: Apply migrations on RDS
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy.pem "ec2-user@${EC2_HOST}" 'chmod +x /tmp/migrate.sh && bash /tmp/migrate.sh'

  deploy:
    needs: [build-push, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync deploy/ to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy.pem" deploy/ "ec2-user@${EC2_HOST}:/home/ec2-user/imedto/"

      - name: Run deploy script on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          GHCR_OWNER: ${{ needs.build-push.outputs.owner_lc }}
        run: |
          ssh -i ~/.ssh/deploy.pem "ec2-user@${EC2_HOST}" \
              "IMAGE_TAG='${IMAGE_TAG}' GHCR_OWNER='${GHCR_OWNER}' GHCR_USER='${{ github.actor }}' bash /home/ec2-user/imedto/scripts/deploy.sh"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 15
            if curl -fsSL "https://app.imedto.com/health"; then
              echo "✅ Healthy"
              exit 0
            fi
            echo "Tentativa $i — aguardando..."
          done
          echo "❌ Smoke test falhou"
          exit 1
