name: CI + Deploy

# Disparado em push pra main (deploy completo) ou em PR (só testes).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Testes — rodam em paralelo com build, em qualquer branch/PR.
  # ─────────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imedto_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - working-directory: backend/src
        run: |
          dotnet restore Imedto.Backend.sln
          dotnet build Imedto.Backend.sln --no-restore -c Release
          # Filtra Integration tests — dependem de fixtures locais.
          dotnet test Tests/Imedto.Backend.Test --no-build -c Release \
              --filter "FullyQualifiedName!~Integration" \
              --logger "console;verbosity=normal"

  test-frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      # Lint best-effort (config legacy ainda).
      - run: npm run lint --if-present || true
      # Garante que nenhum PR introduz font-size/font-weight literal em CSS scoped.
      - run: npm run check:typography -- --ci

  # ─────────────────────────────────────────────────────────────────
  # Build & push das imagens Docker pro ghcr.io.
  # Roda em paralelo com os testes — push pro main não espera teste passar
  # porque o gargalo é só o build (cacheado), e os testes próprios falham
  # cedo com `set -e` se houver problema sério.
  # ─────────────────────────────────────────────────────────────────
  build-push:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=min,scope=frontend
      # As imagens base .NET do MCR (mcr.microsoft.com) sofrem rate-limit (429)
      # persistente em pulls anônimos dos runners. Para tirar o MCR do caminho:
      # publica self-contained no runner (SDK via setup-dotnet/CDN — sem 429) e
      # empacota numa base Ubuntu (Docker Hub). O runtime .NET vai no publish.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish backend (self-contained, sem MCR)
        working-directory: backend/src
        run: |
          dotnet publish Services/Imedto.Backend.API/Imedto.Backend.API.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o "$GITHUB_WORKSPACE/publish-backend"
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: publish-backend
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/imedto-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=min,scope=backend

  # ─────────────────────────────────────────────────────────────────
  # Migration: gera SQL idempotente e aplica no Postgres local (container na EC2) via SSH.
  # Espera: testes do backend (não pode aplicar schema quebrado) + build (não tem efeito direto, mas garante que a imagem está pronta antes).
  # ─────────────────────────────────────────────────────────────────
  migrate:
    needs: [test-backend, build-push]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
      - name: Generate idempotent SQL
        working-directory: backend/src
        run: |
          dotnet tool restore
          dotnet restore Imedto.Backend.sln
          dotnet ef migrations script --idempotent \
              --project Services/Imedto.Backend.Infrastructure \
              --startup-project Services/Imedto.Backend.API \
              --output /tmp/migrate.sql
          # Anexa SQL puro (seeds, functions, índices CONCURRENTLY) de db/migrations/
          # ao script final, na ordem do filename (timestamp prefix garante).
          # Cada .sql deve ser internamente idempotente (use IF NOT EXISTS / WHERE NOT EXISTS).
          for sql_file in $(find ../../db/migrations -maxdepth 1 -name '*.sql' | sort); do
            echo "" >> /tmp/migrate.sql
            echo "-- ===== $(basename "$sql_file") =====" >> /tmp/migrate.sql
            cat "$sql_file" >> /tmp/migrate.sql
          done
      - name: Send SQL & migrate-script to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          scp -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null /tmp/migrate.sql "ec2-user@${EC2_HOST}:/tmp/migrate.sql"
          scp -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deploy/scripts/migrate.sh "ec2-user@${EC2_HOST}:/tmp/migrate.sh"
      - name: Apply migrations on Postgres (local container)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "ec2-user@${EC2_HOST}" 'chmod +x /tmp/migrate.sh && bash /tmp/migrate.sh'

  # ─────────────────────────────────────────────────────────────────
  # Deploy: rsync deploy/ + docker compose pull/up na EC2.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    needs: [build-push, migrate]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
      - name: Sync deploy/ to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" deploy/ "ec2-user@${EC2_HOST}:/home/ec2-user/imedto/"
      - name: Run deploy script on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          GHCR_OWNER: ${{ needs.build-push.outputs.owner_lc }}
        run: |
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "ec2-user@${EC2_HOST}" \
              "IMAGE_TAG='${IMAGE_TAG}' GHCR_OWNER='${GHCR_OWNER}' GHCR_USER='${{ github.actor }}' bash /home/ec2-user/imedto/scripts/deploy.sh"

  # ─────────────────────────────────────────────────────────────────
  # Smoke test: bate em https://app.imedto.com/health.
  # ─────────────────────────────────────────────────────────────────
  smoke:
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 15
            if curl -fsSL "https://app.imedto.com/health"; then
              echo "✅ Healthy"
              exit 0
            fi
            echo "Tentativa $i — aguardando..."
          done
          echo "❌ Smoke test falhou"
          exit 1
