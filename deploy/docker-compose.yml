# docker-compose.yml — deploy no EC2 (sa-east-1)
# Lido junto com o .env gerado pelo scripts/pull-secrets.sh.
# Imagens vêm do GitHub Container Registry (ghcr.io).
#
# Banco: Postgres roda como container nesta mesma EC2 (não mais RDS).
# Decisão de redução de custo — ambiente de teste/baixo volume. Volume `pgdata`
# persiste os dados. Senha = DB_PASSWORD do SSM (volume foi inicializado com ela).

services:
  postgres:
    image: postgres:17-alpine
    container_name: imedto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imedto
      POSTGRES_DB: imedto
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [imedto]
    # Tuning para t3.micro (1 GB RAM, compartilhado com .NET + nginx + caddy).
    command: postgres -c shared_buffers=96MB -c max_connections=50 -c effective_cache_size=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imedto -d imedto"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ghcr.io/${GHCR_OWNER}/imedto-backend:${IMAGE_TAG:-latest}
    container_name: imedto-backend
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      # Pool Npgsql (Postgres local — rede interna Docker, sem TLS):
      # - Maximum Pool Size=20 → folga sem estourar max_connections=50 do container.
      # - Minimum Pool Size=2 → mantém 2 conexões warm.
      # - Connection Idle Lifetime=300 → recicla idle após 5min.
      # - Connection Pruning Interval=10 → varre idle a cada 10s.
      # - Command Timeout=30 → query lenta (>30s) aborta em vez de segurar pool inteiro.
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=imedto;Username=imedto;Password=${DB_PASSWORD};SSL Mode=Disable;Pooling=true;Maximum Pool Size=20;Minimum Pool Size=2;Connection Idle Lifetime=300;Connection Pruning Interval=10;Command Timeout=30"
      ConnectionStrings__Migrations: "Host=postgres;Port=5432;Database=imedto;Username=imedto;Password=${DB_PASSWORD};SSL Mode=Disable;Pooling=false;Command Timeout=120"
      Auth__Jwt__Issuer: imedto-backend
      Auth__Jwt__Audience: imedto-app
      Auth__Jwt__PrivateKeyPem: ${JWT_PRIVATE_KEY_PEM}
      Auth__Jwt__PublicKeyPem: ${JWT_PUBLIC_KEY_PEM}
      Auth__Bcrypt__WorkFactor: "12"
      Auth__Bcrypt__Pepper: ${BCRYPT_PEPPER}
      Email__Provider: ${EMAIL_PROVIDER:-Resend}
      Email__From: "Imedto <noreply@imedto.com>"
      Email__AppBaseUrl: "https://app.imedto.com"
      Email__ResendApiKey: ${RESEND_API_KEY}
      Email__ApiKey: ${RESEND_API_KEY}
      Email__Ses__Region: sa-east-1
      Whatsapp__Provider: ${WHATSAPP_PROVIDER:-}
      Whatsapp__AccessToken: ${WHATSAPP_ACCESS_TOKEN:-}
      Whatsapp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:-}
      Whatsapp__TemplateName: ${WHATSAPP_TEMPLATE_NAME:-lembrete_consulta}
      Whatsapp__BaseUrl: ${WHATSAPP_BASE_URL:-https://graph.facebook.com/v19.0}
      Storage__Region: sa-east-1
      Storage__BucketAnexosProntuario: ${S3_BUCKET_ANEXOS}
      Storage__BucketFotos: ${S3_BUCKET_FOTOS}
      AWS_REGION: sa-east-1
      # IA (Anthropic/Claude) — inferência de mapa da Central de Migração.
      # Vazio = "IA não configurada" (job de migração falha visivelmente). Setar o
      # SSM /imedto/dev/ia/anthropic-api-key para habilitar.
      Ia__AnthropicApiKey: ${IA_ANTHROPIC_API_KEY}
      Cors__AllowedOrigins__0: "https://app.imedto.com"
      Cors__AllowedOrigins__1: "https://imedto.com"
      Cors__AllowedOrigins__2: "https://www.imedto.com"
      # App mobile (Capacitor): origens do WebView (iOS/Android) quando o app usa
      # fetch do browser. No device o CapacitorHttp (HTTP nativo) não passa por CORS,
      # mas mantemos estas origens liberadas para WebView/preview e robustez.
      Cors__AllowedOrigins__3: "capacitor://localhost"
      Cors__AllowedOrigins__4: "https://localhost"
      Cors__AllowedOrigins__5: "http://localhost"
      Cors__AllowedOrigins__6: "ionic://localhost"
    expose: ["5000"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [imedto]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/${GHCR_OWNER}/imedto-frontend:${IMAGE_TAG:-latest}
    container_name: imedto-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks: [imedto]
    expose: ["80"]

  caddy:
    image: caddy:2-alpine
    container_name: imedto-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [frontend, backend]
    networks: [imedto]

networks:
  imedto:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  pgdata:
