server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — qualquer rota cai no index.html, Vue Router resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Estáticos com hash (Vite emite arquivos com hash no nome): cache forte.
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health pra docker compose healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
