<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Imedto</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <!--
            Aplica o tema (claro/escuro) ANTES do primeiro render para evitar FOUC.
            Mantenha sincronizado com a chave usada em src/composables/useTheme.ts.
        -->
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("imedto-theme") || "light"
                    var dark = t === "dark"
                        || (t === "auto" && window.matchMedia
                            && window.matchMedia("(prefers-color-scheme: dark)").matches)
                    document.documentElement.classList.toggle("dark", dark)
                    document.documentElement.dataset.theme = dark ? "dark" : "light"
                } catch (e) { /* noop */ }
            })()
        </script>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
